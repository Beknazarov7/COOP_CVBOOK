        /* Inline styles to match cv-cards page */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
  min-height: 100vh;
  color: #333;
}

        /* ====== GLOBAL PAGE LAYOUT (centers sections nicely) ====== */
.header-title,
.header-nav,
.filter-section,
.main-content {
  max-width: 1200px;
  margin: 0 auto;
}
/* -------- Sections & spacing -------- */
.main-heading{
  font-size: 2.5rem;
  font-weight: 800;
  color: #fff;
  margin: 0 auto 22px;
  text-align: center;
  text-shadow: 0 4px 8px rgba(0,0,0,0.20);
}
.main-content{
  max-width: 1240px;
  margin: 0 auto;
}

.header {
  background: #fff;
  border-bottom: 2px solid #223b84; /* UCA brand line */
}

.header-bar{
  position: relative;                 /* lets us center the nav cleanly */
  display: flex;
  align-items: center;
  padding: 14px 22px;
  border-bottom: 1px solid #e6eef6;   /* subtle line like the mock */
  min-height: 78px;
  background:#fff;
}
.header-left{
  display:flex;
  align-items:center;
  gap:14px;
}
/* ===== LOGO ===== */
.header-logo{
  width:auto;                         /* scale to match the screenshot feel */
  height:65px;
  object-fit:contain;
}

/* ===== NAVIGATION ===== */
.header-nav{
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display:flex;
  align-items:center;
  gap: 48px;                          /* spread like the sample */
}

.header-nav a{
  font-family: "Georgia", serif;
  font-weight: 700;
  font-size: 16px;
  color:#1e5b73;                      /* blue-green like your palette */
  text-decoration:none;
  transition: color .2s ease, transform .2s ease;
  white-space:nowrap;
}

.header-nav a:hover{
  color:#184b5f;
  transform: translateY(-1px);
}
/* right social pills */
.header-social{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:14px;
}

.header-social a{
  width:30px;
  height:30px;
  display:grid;
  place-items:center;
  background:#000;
  color:#fff;
  border-radius:50%;
  text-decoration:none;
  transition: transform .15s ease, opacity .15s ease;
}
.header-social a:hover{ transform:translateY(-1px); opacity:.9; }
.header-social i{ font-size:16px; }
.header-nav a:focus-visible{
  outline: none;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, .25);
}
/* Underline indicator on hover to add polish */
.header-nav a::after{
  content: "";
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 7px;
  height: 2px;
  background: #1f4db7;         /* brand-ish blue */
  opacity: 0;
  transform: scaleX(.4);
  transform-origin: center;
  transition: transform .18s ease, opacity .18s ease;
}
.header-nav a:hover::after{
  opacity: 1;
  transform: scaleX(1);
}

@media (max-width: 1024px){
  .header-nav{ gap: 28px; }
  .header-nav a{ font-size: 18px; }
  .header-logo{ width:72px; }
}

@media (max-width: 720px){
  .header-bar{
    padding: 10px 12px;
    min-height: 64px;
  }
  .header-nav{
    position: static;
    transform:none;
    margin: 8px auto 0;
    order: 3;
  }
  .header-nav a{ font-size: 16px; }
  .header-left{ gap:10px; }
}

/* ======================================
   FILTER SECTION 
   ====================================== */
:root{
  --accent: #1f4db7;           /* your blue */
  --accent-weak: #eaf1ff;
  --ink: #1f2a44;               /* titles */
  --muted: #667291;
  --line: #e8eef6;
  --surface: #ffffff;
  --chip: #f6f8fd;
  --shadow: 0 8px 22px rgba(24, 39, 75, .08);
  --ring: 0 0 0 3px rgba(31, 77, 183, .18);
}
.filter-section{
  max-width: 1400px;
  margin: 20px auto 36px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.10);
  border: 1px solid rgba(255,255,255,0.2);
}
/* ---------- Tabs (ALL / COMPUTER SCIENCE) ---------- */
.filter-tabs{
  display:flex;
  gap:12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid #f1f5f9;
  flex-wrap: wrap;
}
.filter-tab{
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  font-weight: 700;
  cursor: pointer;
  color: #64748b;
  background: transparent;
  transition: all .3s ease;
  position: relative;
}
.filter-tab:hover:not(.active){
  background: #f8fafc;
  color: #2563eb;
}
.filter-tab:hover{ background: #f0f4ff; }
.filter-tab.active{
  background: linear-gradient(135deg,#2563eb,#1d4ed8);
  color: #fff;
  box-shadow: 0 4px 15px rgba(37,99,235,0.30);
}

/* ---------- Controls row ---------- */
.filter-controls{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
  align-items: end;
}
.filter-dropdowns{
  display: contents; /* let each select flow into the grid cells */
}
.filter-search-sort{
  display: flex;
  align-items: center;
  gap: 10px;
}
.dropdown{
  padding: 12px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  background: #fff;
  font-size: 1rem;
  font-weight: 600;
  color: #334155;
  transition: all .3s ease;
  height: 46px;
  appearance: none;
}
.dropdown:hover{ background-color: #fbfdff; }
.dropdown:focus{
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
}
.search-bar{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  background: #fff;
  height: 46px;
  transition: all .3s ease;
}
.search-bar i{ color: #666; font-size: 16px; }
.search-bar input{
  border: none; outline: none; background: transparent;
  font-size: 1rem; font-weight: 600; color: #334155; width: 100%;
}
.search-bar:hover{ background: #fbfdff; }
.search-bar:focus-within{
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
}
/* ---------- Sort select aligns with search ---------- */
.filter-search-sort .dropdown{
  min-width: 130px;
}
/* ---------- Responsive tweaks ---------- */
@media (max-width: 1100px){
  .filter-dropdowns{
    grid-template-columns: repeat(2, minmax(160px,1fr));
  }
  .search-bar{ min-width: 280px; }
}
@media (max-width: 640px){
  .filter-controls{
    grid-template-columns: 1fr;
  }
  .filter-search-sort{
    justify-content: stretch;
  }
  .search-bar{ width: 100%; }
}

    :root{

  --line: #e7edf5;

  --shadow-lg: 0 14px 34px rgba(24, 39, 75, .12);
  --ring: 0 0 0 3px rgba(31, 77, 183, .18);
}
.card-container{
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap: 18px;
  padding: 8px 0 28px;
}
.student-card{
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  color: inherit;
  text-decoration: none;
  transition: all .3s cubic-bezier(0.175,0.885,0.32,1.275);
  position: relative;
  overflow: hidden;
}
.student-card::before{
  content:"";
  position: absolute;
  top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg,#2563eb,#1d4ed8,#1e40af);
  transform: translateX(-100%);
  transition: transform .6s ease;
}
.student-card:hover::before{ transform: translateX(0); }
.student-card:hover{
  transform: translateY(-5px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  background: rgba(255,255,255,0.98);
}

        /* ------- Card typography ------- */
.student-name {
  font-size: 1.1rem;
  font-weight: 800;
  color: #1e293b;
  margin-top: 15px;     /* NEW: push name a bit down */
  margin-bottom: 8px;   /* slightly more spacing before major */

}
.student-major {
  display: inline-block;
  background: linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: .78rem;
  font-weight: 600;
  margin-top: 5px;     /* NEW: extra gap from name */

}
.submitted-date{
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(37,99,235,0.10);
  color: #2563eb;
  padding: 4px 9px;
  border-radius: 12px;
  font-size: .72rem;
  font-weight: 700;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.student-card{ animation: fadeInUp .6s ease forwards; }
.student-card:nth-child(even){ animation-delay: .1s; }
.student-card:nth-child(3n){ animation-delay: .2s; }

/* Responsive tweak */
@media (max-width: 768px){
  .main-content{ padding: 0 12px; }
  .card-container{ grid-template-columns: 1fr; }
}

    <div id="root"></div>
    <script type="text/babel">
    const { useState, useEffect } = React;

    const NavBar = ({ token, setToken }) => (
        <nav className="bg-gray-800 p-4 text-white">
            <div className="container mx-auto flex justify-between">
                <h1 className="text-xl font-bold">CV Management</h1>
                <div>
                    {token ? (
                        <>

                            <button onClick={() => { localStorage.removeItem('token'); setToken(null); window.location.hash = '#login'; }} className="mr-4 text-white hover:text-gray-300">Logout</button>
                        </>
                    ) : (
                        <>
                            <button onClick={() => window.location.hash = '#signup'} className="mr-4 text-white hover:text-gray-300">Sign Up</button>
                            <button onClick={() => window.location.hash = '#login'} className="mr-4 text-white hover:text-gray-300">Login</button>

    const PendingApproval = () => (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
            <div className="w-full max-w-md bg-white p-8 rounded-lg shadow-lg text-center">
                <h2 className="text-3xl font-bold text-gray-800 mb-4">Pending Approval</h2>
                <p className="text-gray-600 mb-4">Your account is awaiting admin approval. Please wait while we review your request.</p>
                <p className="text-gray-500">You will be notified once your account is approved.</p>
            </div>
        </div>
    );

    // ===== Sign Up (full-height glass panel) =====
const SignUp = () => { 
  const [formData, setFormData] = React.useState({
    username: "", email: "", password: "", first_name: "", last_name: ""
  });
  const [message, setMessage] = React.useState("");

  const handleSubmit = async (e) => {
    e.preventDefault();
    try {
      const response = await fetch("http://localhost:8000/api/auth/signup/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData),
      });
      const data = await response.json();
      if (response.status === 201) {
        setMessage(data.message || "Sign up successful. Awaiting approval.");
        setTimeout(() => (window.location.hash = "#pending-approval"), 1500);
      } else {
        setMessage(data.error || "Sign up failed.");
      }
    } catch {
      setMessage("An error occurred. Please try again.");
    }
  };

  return (
    <div className="relative min-h-screen">
      <img src="/static/cv/foto1.jpg" alt=""
           className="absolute inset-0 h-full w-full object-cover -z-10" />
      <div className="absolute inset-0 bg-black/20 -z-10" />

      <section className="fixed left-0 top-0 h-screen w-full sm:w-[460px] md:w-[500px] lg:w-[520px]
                          border-r border-white/30 bg-white/15 backdrop-blur-xl shadow-2xl">
        <div className="h-full flex flex-col justify-center px-6 md:px-10">
          <div className="flex justify-center mb-6">
            {/* Bigger logo */}
            <img src="/static/cv/uca_logo2.png" alt="UCA" className="h-36 w-auto" />
          </div>

          <form onSubmit={handleSubmit} className="space-y-4">
            <input
              className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                         text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="text" placeholder="Username" required
              value={formData.username}
              onChange={(e) => setFormData({ ...formData, username: e.target.value })}
            />
            <input
              className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                         text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="email" placeholder="Email" required
              value={formData.email}
              onChange={(e) => setFormData({ ...formData, email: e.target.value })}
            />
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <input
                className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                           text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                type="text" placeholder="First name"
                value={formData.first_name}
                onChange={(e) => setFormData({ ...formData, first_name: e.target.value })}
              />
              <input
                className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                           text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                type="text" placeholder="Last name"
                value={formData.last_name}
                onChange={(e) => setFormData({ ...formData, last_name: e.target.value })}
              />
            </div>
            <input
              className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                         text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="password" placeholder="Password" required
              value={formData.password}
              onChange={(e) => setFormData({ ...formData, password: e.target.value })}
            />

            <button type="submit"
                    className="w-full rounded-xl bg-[#3a7ccf] py-3 text-white font-semibold shadow hover:opacity-95 transition">
              Sign up
            </button>

            {message && (
              <p className={`text-center text-sm mt-1 ${message.includes("successful") ? "text-green-600" : "text-red-600"}`}>
                {message}
              </p>
            )}
          </form>

          <div className="mt-6 text-center text-sm">
            <span className="text-white">Already have an account? </span>
            <a href="#login" className="text-white hover:underline">Log in</a>
          </div>
        </div>
      </section>
    </div>
  );
};


// ===== Login (full-height glass panel) =====
const Login = ({ setToken }) => {
  const [formData, setFormData] = React.useState({ username: "", password: "" });
  const [message, setMessage] = React.useState("");

  const handleSubmit = async (e) => {
    e.preventDefault();
    try {
      const response = await fetch("http://localhost:8000/api/auth/signin/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData),
      });
      const data = await response.json();
      if (response.status === 403) {
        setMessage(data.error || "Login failed. Account pending approval.");
        setTimeout(() => (window.location.hash = "#pending-approval"), 1500);
      } else if (response.ok) {
        localStorage.setItem("token", data.access);
        setToken(data.access);
        window.location.hash = "#cv-cards";
      } else {
        setMessage(data.error || "Login failed");
      }
    } catch {
      setMessage("An error occurred. Please try again.");
    }
  };

  return (
    <div className="relative min-h-screen">
      <img src="/static/cv/foto1.jpg" alt=""
           className="absolute inset-0 h-full w-full object-cover -z-10" />
      <div className="absolute inset-0 bg-black/20 -z-10" />

      <section className="fixed left-0 top-0 h-screen w-full sm:w-[460px] md:w-[500px] lg:w-[520px]
                          border-r border-white/30 bg-white/15 backdrop-blur-xl shadow-2xl">
        <div className="h-full flex flex-col justify-center px-6 md:px-10">
          <div className="flex justify-center mb-6">
            <img src="/static/cv/uca_logo2.png" alt="UCA" className="h-36 w-auto" />
          </div>

          <form onSubmit={handleSubmit} className="space-y-4">
            <input
              className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                         text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="text" placeholder="Username" required
              value={formData.username}
              onChange={(e) => setFormData({ ...formData, username: e.target.value })}
            />
            <input
              className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                         text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="password" placeholder="Password" required
              value={formData.password}
              onChange={(e) => setFormData({ ...formData, password: e.target.value })}
            />

            <button type="submit"
                    className="w-full rounded-xl bg-[#3a7ccf] py-3 text-white font-semibold shadow hover:opacity-95 transition">
              Log in
            </button>

            {message && <p className="text-center text-red-600 text-sm">{message}</p>}
          </form>

          <div className="mt-6 flex items-center justify-between text-sm">
            <a href="#" className="text-white hover:underline">Lost password?</a>
            <a href="#signup" className="text-white hover:underline">Create account</a>
          </div>
        </div>
      </section>
    </div>
  );
};


    const CVCards = ({ token, filters }) => {
        const [allCvs, setAllCvs] = useState([]);
        const [cvs, setCvs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        useEffect(() => {
            const fetchCVs = async () => {
                try {
                    const response = await fetch('http://localhost:8000/cv/cards/', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!response.ok) throw new Error(`Failed: ${response.status}`);
                    const data = await response.json();
                    setAllCvs(data);
                    setCvs(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
            fetchCVs();
        }, [token]);

        useEffect(() => {
            let filtered = [...allCvs];
            if (filters.category && filters.category !== 'all') {
                filtered = filtered.filter(cv => (cv.major || '').toLowerCase().includes(filters.category.replace(/-/g, ' ')));
            }
            if (filters.country) filtered = filtered.filter(cv => (cv.country || '').toLowerCase() === filters.country.toLowerCase());
            if (filters.language) filtered = filtered.filter(cv => (cv.language || '').toLowerCase() === filters.language.toLowerCase());
            if (filters.techSkill) filtered = filtered.filter(cv => (cv.technical_skills || '').toLowerCase().includes(filters.techSkill.toLowerCase()));
            if (filters.nonTechSkill) filtered = filtered.filter(cv => (cv.non_technical_skills || '').toLowerCase().includes(filters.nonTechSkill.toLowerCase()));
            if (filters.searchTerm) filtered = filtered.filter(cv => (`${cv.name} ${cv.surname}`).toLowerCase().includes(filters.searchTerm.toLowerCase()));
            if (filters.sortOrder === 'A-Z') filtered.sort((a,b) => a.name.localeCompare(b.name));
            if (filters.sortOrder === 'Z-A') filtered.sort((a,b) => b.name.localeCompare(a.name));
            setCvs(filtered);
        }, [filters, allCvs]);

        if (loading) return <div>Loading...</div>;
        if (error) return <div>Error: {error}</div>;

        return (
            <main className="main-content">
                <h1 className="main-heading">Student Profiles</h1>
                <div className="card-container">
                    {cvs.map(cv => (
                        <a key={cv.id} href={`/cv/detail/${cv.id}/`} className="student-card">
                            <div className="student-name">{cv.name} {cv.surname}</div>
                            <div className="student-major">{cv.major || 'N/A'}</div>
                            <div className="submitted-date">
                                <small>Submitted: {new Date(cv.submitted_at).toLocaleDateString()}</small>
                            </div>
                        </a>
                    ))}
                </div>
            </main>
        );
    };

    const App = () => {
        const [token, setToken] = useState(localStorage.getItem('token'));
        const [page, setPage] = useState(window.location.hash);
        const [filters, setFilters] = useState({ category:'all', country:'', language:'', techSkill:'', nonTechSkill:'', sortOrder:'', searchTerm:'' });

        useEffect(() => {
            const onHash = () => setPage(window.location.hash);
            window.addEventListener('hashchange', onHash);
            return () => window.removeEventListener('hashchange', onHash);
        }, []);

        return (
            <div>
                {page === '#cv-cards' && token ? (
                    <>
                        <header>
  <div className="header-bar">
    {/* Left: logo (your PNG) + optional wordmark text */}
    <div className="header-left">
      <img src="/static/cv/uca_logo.png" alt="UCA Logo" className="header-logo" />
      {/* If your logo already contains the words, you can delete this span */}
    </div>

    {/* Center: nav (kept your class name) */}
    <nav className="header-nav">
      <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>Home Page</a>
      <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>About</a>
      <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>FAQ</a>
      <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>Contacts</a>
    </nav>

    {/* Right: socials (new small block) */}
    <div className="header-social">
      <a href="https://www.linkedin.com/in/uca-career-opportunities/" aria-label="LinkedIn"><i className="fab fa-linkedin-in"></i></a>
      <a href="https://www.instagram.com/uca_career_opportunities/?igshid=YmMyMTA2M2Y%3D" aria-label="Instagram"><i className="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/@ucacareeropportunities1011" aria-label="YouTube"><i className="fab fa-youtube"></i></a>
    </div>
  </div>
</header>
                        <section className="filter-section">
                            <div className="filter-tabs">
  <span
    className={`filter-tab ${filters.category === 'all' ? 'active' : ''}`}
    onClick={() => setFilters({ ...filters, category: 'all' })}
  >
    ALL
  </span>

  <span
    className={`filter-tab ${filters.category === 'computer-science' ? 'active' : ''}`}
    onClick={() => setFilters({ ...filters, category: 'computer-science' })}
  >
    COMPUTER SCIENCE
  </span>

  <span
    className={`filter-tab ${filters.category === 'communication-and-media' ? 'active' : ''}`}
    onClick={() => setFilters({ ...filters, category: 'communication-and-media' })}
  >
    COMMUNICATION & MEDIA
  </span>

  <span
    className={`filter-tab ${filters.category === 'global-economics' ? 'active' : ''}`}
    onClick={() => setFilters({ ...filters, category: 'global-economics' })}
  >
    GLOBAL ECONOMICS
  </span>

  <span
    className={`filter-tab ${filters.category === 'earth-and-environmental-sciences' ? 'active' : ''}`}
    onClick={() => setFilters({ ...filters, category: 'earth-and-environmental-sciences' })}
  >
    EARTH & ENVIRONMENTAL SCIENCES
  </span>
</div>

                            <div className="filter-controls">
                                <div className="filter-dropdowns">
                                    <select className="dropdown" onChange={e=>setFilters({...filters,country:e.target.value})}>
                                        <option value="">COUNTRY</option>
                                        <option value="Kyrgyzstan">Kyrgyzstan</option>
                                        <option value="Tajikistan">Tajikistan</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,language:e.target.value})}>
                                        <option value="">LANGUAGE</option>
                                        <option value="English">English</option>
                                        <option value="Russian">Russian</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,techSkill:e.target.value})}>
                                        <option value="">TECHNICAL SKILLS</option>
                                        <option value="Programming">Programming</option>
                                        <option value="Data Analysis">Data Analysis</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,nonTechSkill:e.target.value})}>
                                        <option value="">NON-TECHNICAL SKILLS</option>
                                        <option value="Communication">Communication</option>
                                        <option value="Teamwork">Teamwork</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,sortOrder:e.target.value})}>
                                        <option value="">Sort</option>
                                        <option value="A-Z">A-Z</option>
                                        <option value="Z-A">Z-A</option>
                                    </select>
                                </div>
                                <div className="filter-search-sort">
                                    <div className="search-bar">
                                        <i className="fas fa-search"></i>
                                        <input type="text" placeholder="Search" onChange={e=>setFilters({...filters,searchTerm:e.target.value})}/>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <CVCards token={token} filters={filters}/>
                    </>
                ) : (
                    <>
                        {/* <NavBar token={token} setToken={setToken}/> */}
                        {page === '#signup' && <SignUp />}
                        {page === '#login' && <Login setToken={setToken} />}
                        {page === '#pending-approval' && <PendingApproval />}
                    </>
                )}
            </div>
        );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
