<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Management</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
/* Existing styles remain largely intact with minor tweaks */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    min-height: 100vh;
    color: #333;
    margin: 0;
    padding: 0;
}
.header-title, .header-nav, .filter-section, .main-content {
    max-width: 1200px;
    margin: 0 auto;
}
.main-heading {
    font-size: 2.5rem;
    font-weight: 800;
    color: #fff;
    margin: 0 auto 22px;
    text-align: center;
    text-shadow: 0 4px 8px rgba(0,0,0,0.20);
}
.main-content {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 12px; /* Added padding for responsiveness */
}
.header {
    background: #fff;
    border-bottom: 2px solid #223b84;
    position: sticky;
    top: 0;
    z-index: 10;
}
.header-bar {
    position: relative;
    display: flex;
    align-items: center;
    padding: 14px 22px;
    border-bottom: 1px solid #e6eef6;
    min-height: 78px;
    background: #fff;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 14px;
}
.header-logo {
    width: auto;
    height: 65px;
    object-fit: contain;
}
.header-nav {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 48px;
}
.header-nav a {
    font-family: "Georgia", serif;
    font-weight: 700;
    font-size: 16px;
    color: #1e5b73;
    text-decoration: none;
    transition: color .2s ease, transform .2s ease;
    white-space: nowrap;
}
.header-nav a:hover {
    color: #184b5f;
    transform: translateY(-1px);
}
.header-social {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
}
.header-social a {
    width: 30px;
    height: 30px;
    display: grid;
    place-items: center;
    background: #000;
    color: #fff;
    border-radius: 50%;
    text-decoration: none;
    transition: transform .15s ease, opacity .15s ease;
}
.header-social a:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}
.header-social i { font-size: 16px; }
.header-nav a:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .25);
}
.header-nav a::after {
    content: "";
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 7px;
    height: 2px;
    background: #1f4db7;
    opacity: 0;
    transform: scaleX(.4);
    transform-origin: center;
    transition: transform .18s ease, opacity .18s ease;
}
.header-nav a:hover::after {
    opacity: 1;
    transform: scaleX(1);
}
@media (max-width: 1024px) {
    .header-nav { gap: 28px; }
    .header-nav a { font-size: 18px; }
    .header-logo { width: 72px; }
}
@media (max-width: 720px) {
    .header-bar { padding: 10px 12px; min-height: 64px; }
    .header-nav {
        position: static;
        transform: none;
        margin: 8px auto 0;
        order: 3;
    }
    .header-nav a { font-size: 16px; }
    .header-left { gap: 10px; }
}
/* Filter section and CV cards styles remain unchanged */
.filter-section { /* ... existing styles ... */ }
.card-container { /* ... existing styles ... */ }
.student-card { /* ... existing styles ... */ }
.chat-icon {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #3a7ccf;
    color: #ffffff;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    transition: background-color 0.3s;
}
.chat-icon:hover {
    background-color: #2e639f;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const NavBar = ({ token, setToken }) => (
    <nav className="header">
        <div className="header-bar">
            <div className="header-left">
                <img src="/static/cv/uca_logo.png" alt="UCA Logo" className="header-logo" />
            </div>
            <nav className="header-nav">
                <a href="#cv-cards" onClick={(e) => { e.preventDefault(); window.location.hash = '#cv-cards'; }}>Home Page</a>
                <a href="#cv-cards" onClick={(e) => { e.preventDefault(); window.location.hash = '#cv-cards'; }}>About</a>
                <a href="#cv-cards" onClick={(e) => { e.preventDefault(); window.location.hash = '#cv-cards'; }}>FAQ</a>
                <a href="#cv-cards" onClick={(e) => { e.preventDefault(); window.location.hash = '#cv-cards'; }}>Contacts</a>
            </nav>
            <div className="header-social">
                <a href="https://www.linkedin.com/in/uca-career-opportunities/" aria-label="LinkedIn"><i className="fab fa-linkedin-in"></i></a>
                <a href="https://www.instagram.com/uca_career_opportunities/?igshid=YmMyMTA2M2Y%3D" aria-label="Instagram"><i className="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@ucacareeropportunities1011" aria-label="YouTube"><i className="fab fa-youtube"></i></a>
            </div>
            <div>
                {token ? (
                    <>
                        <button onClick={() => { localStorage.removeItem('token'); setToken(null); window.location.hash = '#login'; }} className="mr-4 text-white hover:text-gray-300">Logout</button>
                    </>
                ) : (
                    <>
                        <button onClick={() => window.location.hash = '#signup'} className="mr-4 text-white hover:text-gray-300">Sign Up</button>
                        <button onClick={() => window.location.hash = '#login'} className="mr-4 text-white hover:text-gray-300">Login</button>
                    </>
                )}
            </div>
        </div>
    </nav>
);

const PendingApproval = () => (
    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
        <div className="w-full max-w-md bg-white p-8 rounded-lg shadow-lg text-center">
            <h2 className="text-3xl font-bold text-gray-800 mb-4">Pending Approval</h2>
            <p className="text-gray-600 mb-4">Your account is awaiting admin approval. Please wait while we review your request.</p>
            <p className="text-gray-500">You will be notified once your account is approved.</p>
        </div>
    </div>
);

// ===== Sign Up =====
const SignUp = () => {
    const [formData, setFormData] = useState({
        username: "", email: "", password: "", first_name: "", last_name: ""
    });
    const [message, setMessage] = useState("");
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
            const response = await fetch("http://localhost:8000/api/auth/signup/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify(formData),
            });
            const data = await response.json();
            if (response.status === 201) {
                setMessage(data.message || "Sign up successful. Awaiting approval.");
                setTimeout(() => (window.location.hash = "#pending-approval"), 1500);
            } else {
                setMessage(data.error || "Sign up failed.");
            }
        } catch {
            setMessage("An error occurred. Please try again.");
        } finally {
            setLoading(false);
        }
    };

    return (
        <div className="relative min-h-screen">
            <img src="/static/cv/foto1.jpg" alt="" className="absolute inset-0 h-full w-full object-cover -z-10" />
            <div className="absolute inset-0 bg-black/20 -z-10" />
            <section className="fixed left-0 top-0 h-screen w-full sm:w-[460px] md:w-[500px] lg:w-[520px]
                                border-r border-white/30 bg-white/15 backdrop-blur-xl shadow-2xl">
                <div className="h-full flex flex-col justify-center px-6 md:px-10">
                    <div className="flex justify-center mb-6">
                        <img src="/static/cv/uca_logo2.png" alt="UCA" className="h-36 w-auto" />
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input
                            className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                       text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            type="text" placeholder="Username" required
                            value={formData.username}
                            onChange={(e) => setFormData({ ...formData, username: e.target.value })}
                        />
                        <input
                            className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                       text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            type="email" placeholder="Email" required
                            value={formData.email}
                            onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                        />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <input
                                className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                           text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                type="text" placeholder="First name"
                                value={formData.first_name}
                                onChange={(e) => setFormData({ ...formData, first_name: e.target.value })}
                            />
                            <input
                                className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                           text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                type="text" placeholder="Last name"
                                value={formData.last_name}
                                onChange={(e) => setFormData({ ...formData, last_name: e.target.value })}
                            />
                        </div>
                        <input
                            className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                       text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            type="password" placeholder="Password" required
                            value={formData.password}
                            onChange={(e) => setFormData({ ...formData, password: e.target.value })}
                        />
                        <button type="submit" disabled={loading}
                                className="w-full rounded-xl bg-[#3a7ccf] py-3 text-white font-semibold shadow hover:opacity-95 transition">
                            {loading ? "Signing up..." : "Sign up"}
                        </button>
                        {message && (
                            <p className={`text-center text-sm mt-1 ${message.includes("successful") ? "text-green-600" : "text-red-600"}`}>
                                {message}
                            </p>
                        )}
                    </form>
                    <div className="mt-6 text-center text-sm">
                        <span className="text-white">Already have an account? </span>
                        <a href="#login" className="text-white hover:underline">Log in</a>
                    </div>
                </div>
            </section>
        </div>
    );
};

// ===== Login =====
const Login = ({ setToken }) => {
    const [formData, setFormData] = useState({ username: "", password: "" });
    const [message, setMessage] = useState("");
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
            const response = await fetch("http://localhost:8000/api/auth/signin/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify(formData),
            });
            const data = await response.json();
            if (response.status === 403) {
                setMessage(data.error || "Login failed. Account pending approval.");
                setTimeout(() => (window.location.hash = "#pending-approval"), 1500);
            } else if (response.ok) {
                localStorage.setItem("token", data.access);
                setToken(data.access);
                window.location.hash = "#cv-cards";
            } else {
                setMessage(data.error || "Login failed");
            }
        } catch {
            setMessage("An error occurred. Please try again.");
        } finally {
            setLoading(false);
        }
    };

    const handleLostPassword = () => {
        window.location.href = "http://localhost:8000/api/auth/password/reset/request/";
    };

    return (
        <div className="relative min-h-screen">
            <img src="/static/cv/foto1.jpg" alt="" className="absolute inset-0 h-full w-full object-cover -z-10" />
            <div className="absolute inset-0 bg-black/20 -z-10" />
            <section className="fixed left-0 top-0 h-screen w-full sm:w-[460px] md:w-[500px] lg:w-[520px]
                                border-r border-white/30 bg-white/15 backdrop-blur-xl shadow-2xl">
                <div className="h-full flex flex-col justify-center px-6 md:px-10">
                    <div className="flex justify-center mb-6">
                        <img src="/static/cv/uca_logo2.png" alt="UCA" className="h-36 w-auto" />
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input
                            className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                       text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            type="text"
                            placeholder="Username"
                            required
                            value={formData.username}
                            onChange={(e) => setFormData({ ...formData, username: e.target.value })}
                        />
                        <input
                            className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3
                                       text-slate-900 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            type="password"
                            placeholder="Password"
                            required
                            value={formData.password}
                            onChange={(e) => setFormData({ ...formData, password: e.target.value })}
                        />
                        <button type="submit" disabled={loading}
                                className="w-full rounded-xl bg-[#3a7ccf] py-3 text-white font-semibold shadow hover:opacity-95 transition">
                            {loading ? "Logging in..." : "Log in"}
                        </button>
                        {message && <p className="text-center text-red-600 text-sm">{message}</p>}
                    </form>
                    <div className="mt-6 flex items-center justify-between text-sm">
                        <a href="#password/reset" onClick={(e) => { e.preventDefault(); handleLostPassword(); }} className="text-white hover:underline">
                            Lost password?
                        </a>
                        <a href="#signup" className="text-white hover:underline">
                            Create account
                        </a>
                    </div>
                </div>
            </section>
        </div>
    );
};

const CVCards = ({ token, filters }) => {
    const [allCvs, setAllCvs] = useState([]);
    const [cvs, setCvs] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);

    useEffect(() => {
        const fetchCVs = async () => {
            try {
                const response = await fetch('http://localhost:8000/cv/cards/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error(`Failed: ${response.status}`);
                const data = await response.json();
                setAllCvs(data);
                setCvs(data);
            } catch (err) {
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };
        fetchCVs();
    }, [token]);

    useEffect(() => {
        let filtered = [...allCvs];
        if (filters.category && filters.category !== 'all') {
            filtered = filtered.filter(cv => (cv.major || '').toLowerCase().includes(filters.category.replace(/-/g, ' ')));
        }
        if (filters.country) filtered = filtered.filter(cv => (cv.country || '').toLowerCase() === filters.country.toLowerCase());
        if (filters.language) filtered = filtered.filter(cv => (cv.language || '').toLowerCase() === filters.language.toLowerCase());
        if (filters.techSkill) filtered = filtered.filter(cv => (cv.technical_skills || '').toLowerCase().includes(filters.techSkill.toLowerCase()));
        if (filters.nonTechSkill) filtered = filtered.filter(cv => (cv.non_technical_skills || '').toLowerCase().includes(filters.nonTechSkill.toLowerCase()));
        if (filters.searchTerm) filtered = filtered.filter(cv => (`${cv.name} ${cv.surname}`).toLowerCase().includes(filters.searchTerm.toLowerCase()));
        if (filters.sortOrder === 'A-Z') filtered.sort((a, b) => a.name.localeCompare(b.name));
        if (filters.sortOrder === 'Z-A') filtered.sort((a, b) => b.name.localeCompare(a.name));
        setCvs(filtered);
    }, [filters, allCvs]);

    if (loading) return <div className="text-center text-white mt-10">Loading...</div>;
    if (error) return <div className="text-center text-red-600 mt-10">Error: {error}</div>;
    return (
        <main className="main-content">
            <h1 className="main-heading">Student Profiles</h1>
            <section className="filter-section">
                <div className="filter-tabs">
                    {['all', 'computer-science', 'communication-and-media', 'global-economics', 'earth-and-environmental-sciences'].map(cat => (
                        <span
                            key={cat}
                            className={`filter-tab ${filters.category === cat ? 'active' : ''}`}
                            onClick={() => setFilters({ ...filters, category: cat })}
                        >
                            {cat === 'all' ? 'ALL' : cat.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' & ')}
                        </span>
                    ))}
                </div>
                <div className="filter-controls">
                    <div className="filter-dropdowns">
                        <select className="dropdown" onChange={e => setFilters({ ...filters, country: e.target.value })} value={filters.country}>
                            <option value="">COUNTRY</option>
                            <option value="Kyrgyzstan">Kyrgyzstan</option>
                            <option value="Tajikistan">Tajikistan</option>
                        </select>
                        <select className="dropdown" onChange={e => setFilters({ ...filters, language: e.target.value })} value={filters.language}>
                            <option value="">LANGUAGE</option>
                            <option value="English">English</option>
                            <option value="Russian">Russian</option>
                        </select>
                        <select className="dropdown" onChange={e => setFilters({ ...filters, techSkill: e.target.value })} value={filters.techSkill}>
                            <option value="">TECHNICAL SKILLS</option>
                            <option value="Programming">Programming</option>
                            <option value="Data Analysis">Data Analysis</option>
                        </select>
                        <select className="dropdown" onChange={e => setFilters({ ...filters, nonTechSkill: e.target.value })} value={filters.nonTechSkill}>
                            <option value="">NON-TECHNICAL SKILLS</option>
                            <option value="Communication">Communication</option>
                            <option value="Teamwork">Teamwork</option>
                        </select>
                        <select className="dropdown" onChange={e => setFilters({ ...filters, sortOrder: e.target.value })} value={filters.sortOrder}>
                            <option value="">Sort</option>
                            <option value="A-Z">A-Z</option>
                            <option value="Z-A">Z-A</option>
                        </select>
                    </div>
                    <div className="filter-search-sort">
                        <div className="search-bar">
                            <i className="fas fa-search"></i>
                            <input type="text" placeholder="Search" onChange={e => setFilters({ ...filters, searchTerm: e.target.value })} value={filters.searchTerm} />
                        </div>
                    </div>
                </div>
            </section>
            <div className="card-container">
                {cvs.map(cv => (
                    <a key={cv.id} href={`/cv/detail/${cv.id}/`} className="student-card">
                        <div className="student-name">{cv.name} {cv.surname}</div>
                        <div className="student-major">{cv.major || 'N/A'}</div>
                        <div className="submitted-date">
                            <small>Submitted: {new Date(cv.submitted_at).toLocaleDateString()}</small>
                        </div>
                    </a>
                ))}
            </div>
        </main>
    );
};

const App = () => {
    const [token, setToken] = useState(localStorage.getItem('token'));
    const [page, setPage] = useState(window.location.hash || '#login');
    const [filters, setFilters] = useState({ category: 'all', country: '', language: '', techSkill: '', nonTechSkill: '', sortOrder: '', searchTerm: '' });

    useEffect(() => {
        const onHash = () => setPage(window.location.hash || '#login');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
    }, []);

    return (
        <div>
            <NavBar token={token} setToken={setToken} />
            {page === '#cv-cards' && token ? (
                <CVCards token={token} filters={filters} />
            ) : (
                <>
                    {page === '#signup' && <SignUp />}
                    {page === '#login' && <Login setToken={setToken} />}
                    {page === '#pending-approval' && <PendingApproval />}
                </>
            )}
            <div className="chat-icon" onClick={() => window.location.href = 'https://x.ai/grok'}>
                <i className="fas fa-comment"></i>
            </div>
        </div>
    );
};

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
