<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Management</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Inline styles to match cv-cards page */
        body{
  color: var(--text);
  letter-spacing:.2px;
}

        /* ====== GLOBAL PAGE LAYOUT (centers sections nicely) ====== */
.header-title,
.header-nav,
.filter-section,
.main-content {
  max-width: 1200px;
  margin: 0 auto;
}
/* -------- Sections & spacing -------- */
.main-heading{
  margin: 4px 2px 12px;
  font-size: 34px;
  line-height: 1.2;
  font-weight: 900;
  color: var(--ink);
}
.main-content{
  max-width: 1240px;
  margin: 0 auto;
}
.main-heading{
  margin: 14px 2px 10px;
  font-size: 32px;
  line-height: 1.2;
  color: var(--ink);
  font-weight: 800;
}
.header {
  background: #fff;
  border-bottom: 2px solid #223b84; /* UCA brand line */
}


.header-bar{
  position: sticky;            /* stays visible */
  top: 0;
  z-index: 50;
  background: #ffffff;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 14px 24px;
  border-bottom: 1px solid #e8eef8;    /* subtle divider */
  box-shadow: 0 2px 10px rgba(17, 34, 68, 0.04);
}
/* ===== LOGO ===== */
.header-logo{
  height: 60px;                /* readable wordmark */
  width: auto;
  flex: 0 0 auto;
  object-fit: contain;
}

/* ===== NAVIGATION ===== */
.header-nav{
  margin-left: auto;           /* right-align the nav block */
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 6px;                /* creates a soft group */
  background: #f6f9ff;         /* very light brand tint */
  border: 1px solid #e6eefb;
  border-radius: 9999px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}

.header-nav a{
  position: relative;
  display: inline-flex;
  align-items: center;
  font-weight: 700;
  color: #1f2a44;
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 9999px;
  line-height: 1;
  transition: background .18s ease, color .18s ease, box-shadow .18s ease;
}

.header-nav a:hover{
  background: #eaf1ff;
}
.header-nav a:focus-visible{
  outline: none;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, .25);
}
/* Underline indicator on hover to add polish */
.header-nav a::after{
  content: "";
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 7px;
  height: 2px;
  background: #1f4db7;         /* brand-ish blue */
  opacity: 0;
  transform: scaleX(.4);
  transform-origin: center;
  transition: transform .18s ease, opacity .18s ease;
}
.header-nav a:hover::after{
  opacity: 1;
  transform: scaleX(1);
}

@media (max-width: 768px){
  .header-nav{
    gap:22px;
    flex-wrap:wrap;
  }
  .header-nav a{ font-size:18px; }
}

/* ======================================
   FILTER SECTION 
   ====================================== */
:root{
  --accent: #1f4db7;           /* your blue */
  --accent-weak: #eaf1ff;
  --ink: #1f2a44;               /* titles */
  --muted: #667291;
  --line: #e8eef6;
  --surface: #ffffff;
  --chip: #f6f8fd;
  --shadow: 0 8px 22px rgba(24, 39, 75, .08);
  --ring: 0 0 0 3px rgba(31, 77, 183, .18);
}
.filter-section{
  max-width: 1240px;
  margin: 14px auto 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 14px 16px 16px;
}
/* ---------- Tabs (ALL / COMPUTER SCIENCE) ---------- */
.filter-tabs{
  display: flex;
  gap: 10px;
  align-items: center;
  margin: 4px 0 12px;
  flex-wrap: wrap;
}
.filter-tab{
  height: 36px;
  padding: 0 14px;
  border-radius: 999px;
  font-weight: 700;
  color: var(--ink);
  background: var(--chip);
  border: 1px solid var(--line);
  display: inline-flex;
  align-items: center;
  transition: background .18s, color .18s, border-color .18s, box-shadow .18s;
  cursor: pointer;
}
.filter-tab:hover{ background: #f0f4ff; }
.filter-tab.active{
  color: var(--accent);
  background: var(--accent-weak);
  border-color: #d9e6ff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
}

/* ---------- Controls row ---------- */
.filter-controls{
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
}
.filter-dropdowns{
  display: grid;
  grid-template-columns: repeat(4, minmax(180px, 1fr));
  gap: 10px;
}
.filter-search-sort{
  display: flex;
  align-items: center;
  gap: 10px;
}
.dropdown{
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
    background: var(--ui-bg);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 40px 12px 14px;
  height: 46px;
  font-weight: 700;
  color: var(--ink);
  box-shadow: 0 1px 0 rgba(255,255,255,.7);
  transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
}
.dropdown:hover{ background-color: #fbfdff; }
.dropdown:focus{
  border-color: #ccdcff;
  box-shadow: var(--ring);
  outline: none;
}
.search-bar{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 46px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface);
  min-width: 340px;
  transition: border-color .18s, box-shadow .18s, background-color .18s;
}
.search-bar i{
  color: var(--muted);
  font-size: 16px;
}
.search-bar input{
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-weight: 700;
  color: var(--ink);
}
.search-bar:hover{ background: #fbfdff; }
.search-bar:focus-within{
  border-color: #ccdcff;
  box-shadow: var(--ring);
}
/* ---------- Sort select aligns with search ---------- */
.filter-search-sort .dropdown{
  min-width: 130px;
}
/* ---------- Responsive tweaks ---------- */
@media (max-width: 1100px){
  .filter-dropdowns{
    grid-template-columns: repeat(2, minmax(160px,1fr));
  }
  .search-bar{ min-width: 280px; }
}
@media (max-width: 640px){
  .filter-controls{
    grid-template-columns: 1fr;
  }
  .filter-search-sort{
    justify-content: stretch;
  }
  .search-bar{ width: 100%; }
}
        .chat-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #3a7ccf;
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .chat-icon:hover {
            background-color: #2e639f;
        }
    /* =========================================================
    CV CARDS Main Content
    ========================================================= */
    :root{
  --accent: #1f4db7;      /* your blue */
  --ink: #1f2a44;
  --muted: #5b6b88;
  --line: #e7edf5;
  --surface: #fff;
  --chip: #f6f8fd;
  --shadow-sm: 0 6px 16px rgba(24, 39, 75, .06);
  --shadow-lg: 0 14px 34px rgba(24, 39, 75, .12);
  --ring: 0 0 0 3px rgba(31, 77, 183, .18);
}
.card-container{
  display: grid;
  gap: 22px;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  padding: 6px 2px 24px;
}
.student-card{
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  text-align: left;
  text-decoration: none;
  color: inherit;

  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 22px 24px 18px;

  box-shadow: var(--shadow-sm);
  transition: transform .18s ease, box-shadow .2s ease, border-color .18s ease, background-color .18s ease;
  overflow: hidden;
}
.student-card::before{
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(90deg, #bcd2ff, #6ea5ff 35%, var(--accent));
  opacity: .0;
  transition: opacity .2s ease;
}
.student-card:hover::before,
.student-card:focus-visible::before{ opacity: 1; }
.student-card:hover{
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: #d9e6ff;
  background-color: #fcfdff;
}
.student-card:focus-visible{
  outline: none;
  box-shadow: var(--shadow-lg), var(--ring);
  border-color: #ccdcff;
}
        /* ------- Card typography ------- */
.student-name{
  margin: 2px 0 6px;
  font-size: 22px;
  line-height: 1.25;
  font-weight: 800;
  letter-spacing: .2px;
  color: var(--ink);
  transition: color .18s ease;
}
.student-card:hover .student-name{ color: var(--accent); }
.student-major{
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;

  font-size: 14px;
  font-weight: 700;
  color: var(--ink);

  padding: 8px 12px;
  border-radius: 999px;
  background: var(--chip);
  border: 1px solid var(--line);
  margin: 6px 0 14px;
}
.student-major::before{
  content: "\f19d";
  font-family: "Font Awesome 5 Free";
  font-weight: 900;
  font-size: 14px;
  color: var(--accent);
  opacity: .9;
}
        .submitted-date{
  margin-top: auto;           /* push to the bottom of the card */
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
}
.submitted-date small{
  font-size: 13px;
  letter-spacing: .2px;
}
.submitted-date::before{
  content: "\f017";
  font-family: "Font Awesome 5 Free";
  font-weight: 900;
  font-size: 13px;
  color: var(--muted);
  opacity: .9;
}

/* ------- Small screens ------- */
@media (max-width: 680px){
  .card-container{
    grid-template-columns: 1fr;
  }
  .student-card{ padding: 18px 18px 14px; }
}
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    const { useState, useEffect } = React;

    const NavBar = ({ token, setToken }) => (
        <nav className="bg-gray-800 p-4 text-white">
            <div className="container mx-auto flex justify-between">
                <h1 className="text-xl font-bold">CV Management</h1>
                <div>
                    {token ? (
                        <>
                            <button onClick={() => window.location.hash = '#cv-cards'} className="mr-4 text-white hover:text-gray-300">CV Cards</button>
                            <button onClick={() => { localStorage.removeItem('token'); setToken(null); window.location.hash = '#login'; }} className="mr-4 text-white hover:text-gray-300">Logout</button>
                        </>
                    ) : (
                        <>
                            <button onClick={() => window.location.hash = '#signup'} className="mr-4 text-white hover:text-gray-300">Sign Up</button>
                            <button onClick={() => window.location.hash = '#login'} className="mr-4 text-white hover:text-gray-300">Login</button>
                        </>
                    )}
                </div>
            </div>
        </nav>
    );

    const PendingApproval = () => (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-6">
            <div className="w-full max-w-md bg-white p-8 rounded-lg shadow-lg text-center">
                <h2 className="text-3xl font-bold text-gray-800 mb-4">Pending Approval</h2>
                <p className="text-gray-600 mb-4">Your account is awaiting admin approval. Please wait while we review your request.</p>
                <p className="text-gray-500">You will be notified once your account is approved.</p>
            </div>
        </div>
    );

    const SignUp = () => {
        const [formData, setFormData] = useState({ username: '', email: '', password: '', first_name: '', last_name: '' });
        const [message, setMessage] = useState('');

        const handleSubmit = async (e) => {
            e.preventDefault();
            try {
                const response = await fetch('http://localhost:8000/api/auth/signup/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData),
                });
                const data = await response.json();
                if (response.status === 201) {
                    setMessage(data.message || 'Sign up successful. Awaiting approval.');
                    setTimeout(() => window.location.hash = '#pending-approval', 1500);
                } else {
                    setMessage(data.error || 'Sign up failed.');
                }
            } catch (error) {
                setMessage('An error occurred. Please try again.');
            }
        };

        return (
            <div className="container mx-auto p-6 flex justify-center items-center min-h-screen bg-gray-100">
                <div className="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
                    <h2 className="text-3xl font-bold text-center text-gray-800 mb-6">Sign Up</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="text" placeholder="Username" value={formData.username} onChange={(e) => setFormData({ ...formData, username: e.target.value })} required />
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="email" placeholder="Email" value={formData.email} onChange={(e) => setFormData({ ...formData, email: e.target.value })} required />
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="password" placeholder="Password" value={formData.password} onChange={(e) => setFormData({ ...formData, password: e.target.value })} required />
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="text" placeholder="First Name" value={formData.first_name} onChange={(e) => setFormData({ ...formData, first_name: e.target.value })} />
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="text" placeholder="Last Name" value={formData.last_name} onChange={(e) => setFormData({ ...formData, last_name: e.target.value })} />
                        <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">Sign Up</button>
                        {message && <p className={`mt-4 text-center ${message.includes('successful') ? 'text-green-600' : 'text-red-600'}`}>{message}</p>}
                    </form>
                </div>
            </div>
        );
    };

    const Login = ({ setToken }) => {
        const [formData, setFormData] = useState({ username: '', password: '' });
        const [message, setMessage] = useState('');

        const handleSubmit = async (e) => {
            e.preventDefault();
            try {
                const response = await fetch('http://localhost:8000/api/auth/signin/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData),
                });
                const data = await response.json();
                if (response.status === 403) {
                    setMessage(data.error || 'Login failed. Account pending approval.');
                    setTimeout(() => window.location.hash = '#pending-approval', 1500);
                } else if (response.ok) {
                    localStorage.setItem('token', data.access);
                    setToken(data.access);
                    window.location.hash = '#cv-cards';
                } else {
                    setMessage(data.error || 'Login failed');
                }
            } catch (error) {
                setMessage('An error occurred. Please try again.');
            }
        };

        return (
            <div className="container mx-auto p-6 flex justify-center items-center min-h-screen bg-gray-100">
                <div className="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
                    <h2 className="text-3xl font-bold text-center text-gray-800 mb-6">Login</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="text" placeholder="Username" value={formData.username} onChange={(e) => setFormData({ ...formData, username: e.target.value })} required />
                        <input className="w-full p-3 border border-gray-300 rounded-lg" type="password" placeholder="Password" value={formData.password} onChange={(e) => setFormData({ ...formData, password: e.target.value })} required />
                        <button type="submit" className="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">Login</button>
                        {message && <p className="mt-4 text-center text-red-600">{message}</p>}
                    </form>
                </div>
            </div>
        );
    };

    const CVCards = ({ token, filters }) => {
        const [allCvs, setAllCvs] = useState([]);
        const [cvs, setCvs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        useEffect(() => {
            const fetchCVs = async () => {
                try {
                    const response = await fetch('http://localhost:8000/cv/cards/', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!response.ok) throw new Error(`Failed: ${response.status}`);
                    const data = await response.json();
                    setAllCvs(data);
                    setCvs(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
            fetchCVs();
        }, [token]);

        useEffect(() => {
            let filtered = [...allCvs];
            if (filters.category && filters.category !== 'all') {
                filtered = filtered.filter(cv => (cv.major || '').toLowerCase().includes(filters.category.replace('-', ' ')));
            }
            if (filters.country) filtered = filtered.filter(cv => (cv.country || '').toLowerCase() === filters.country.toLowerCase());
            if (filters.language) filtered = filtered.filter(cv => (cv.language || '').toLowerCase() === filters.language.toLowerCase());
            if (filters.techSkill) filtered = filtered.filter(cv => (cv.technical_skills || '').toLowerCase().includes(filters.techSkill.toLowerCase()));
            if (filters.nonTechSkill) filtered = filtered.filter(cv => (cv.non_technical_skills || '').toLowerCase().includes(filters.nonTechSkill.toLowerCase()));
            if (filters.searchTerm) filtered = filtered.filter(cv => (`${cv.name} ${cv.surname}`).toLowerCase().includes(filters.searchTerm.toLowerCase()));
            if (filters.sortOrder === 'A-Z') filtered.sort((a,b) => a.name.localeCompare(b.name));
            if (filters.sortOrder === 'Z-A') filtered.sort((a,b) => b.name.localeCompare(a.name));
            setCvs(filtered);
        }, [filters, allCvs]);

        if (loading) return <div>Loading...</div>;
        if (error) return <div>Error: {error}</div>;

        return (
            <main className="main-content">
                <h1 className="main-heading">Student Profiles</h1>
                <div className="card-container">
                    {cvs.map(cv => (
                        <a key={cv.id} href={`/cv/detail/${cv.id}/`} className="student-card">
                            <div className="student-name">{cv.name} {cv.surname}</div>
                            <div className="student-major">{cv.major || 'N/A'}</div>
                            <div className="submitted-date">
                                <small>Submitted: {new Date(cv.submitted_at).toLocaleDateString()}</small>
                            </div>
                        </a>
                    ))}
                </div>
            </main>
        );
    };

    const App = () => {
        const [token, setToken] = useState(localStorage.getItem('token'));
        const [page, setPage] = useState(window.location.hash);
        const [filters, setFilters] = useState({ category:'all', country:'', language:'', techSkill:'', nonTechSkill:'', sortOrder:'', searchTerm:'' });

        useEffect(() => {
            const onHash = () => setPage(window.location.hash);
            window.addEventListener('hashchange', onHash);
            return () => window.removeEventListener('hashchange', onHash);
        }, []);

        return (
            <div>
                {page === '#cv-cards' && token ? (
                    <>
                        <header className="header">
  <div className="header-bar">
    <img src="/static/cv/uca_logo.png" alt="UCA Logo" className="header-logo" />
    {/* right side utilities (FAQs…search) go here later if you want; keep empty for now */}
  

  <nav className="header-nav">
    <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>Home Page</a>
    <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>About Us</a>
    <a href="#cv-cards" onClick={(e)=>e.preventDefault()}>Majors</a>
  </nav>
  </div>
</header>
                        <section className="filter-section">
                            <div className="filter-tabs">
                                <span className={`filter-tab ${filters.category==='all'?'active':''}`} onClick={()=>setFilters({...filters,category:'all'})}>ALL</span>
                                <span className={`filter-tab ${filters.category==='computer-science'?'active':''}`} onClick={()=>setFilters({...filters,category:'computer-science'})}>COMPUTER SCIENCE</span>
                            </div>
                            <div className="filter-controls">
                                <div className="filter-dropdowns">
                                    <select className="dropdown" onChange={e=>setFilters({...filters,country:e.target.value})}>
                                        <option value="">COUNTRY</option>
                                        <option value="Kyrgyzstan">Kyrgyzstan</option>
                                        <option value="Tajikistan">Tajikistan</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,language:e.target.value})}>
                                        <option value="">LANGUAGE</option>
                                        <option value="English">English</option>
                                        <option value="Russian">Russian</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,techSkill:e.target.value})}>
                                        <option value="">TECHNICAL SKILLS</option>
                                        <option value="Programming">Programming</option>
                                        <option value="Data Analysis">Data Analysis</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,nonTechSkill:e.target.value})}>
                                        <option value="">NON-TECHNICAL SKILLS</option>
                                        <option value="Communication">Communication</option>
                                        <option value="Teamwork">Teamwork</option>
                                    </select>
                                    <select className="dropdown" onChange={e=>setFilters({...filters,sortOrder:e.target.value})}>
                                        <option value="">Sort</option>
                                        <option value="A-Z">A-Z</option>
                                        <option value="Z-A">Z-A</option>
                                    </select>
                                </div>
                                <div className="filter-search-sort">
                                    <div className="search-bar">
                                        <i className="fas fa-search"></i>
                                        <input type="text" placeholder="Search" onChange={e=>setFilters({...filters,searchTerm:e.target.value})}/>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <CVCards token={token} filters={filters}/>
                    </>
                ) : (
                    <>
                        <NavBar token={token} setToken={setToken}/>
                        {page === '#signup' && <SignUp />}
                        {page === '#login' && <Login setToken={setToken} />}
                        {page === '#pending-approval' && <PendingApproval />}
                    </>
                )}
            </div>
        );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
