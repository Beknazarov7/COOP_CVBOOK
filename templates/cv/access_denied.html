{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | UCA Co-op</title>
    <link rel="icon" type="image/png" href="{% static 'cv/uca-logo-favicon.png' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .error-page-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            background-image: url("{% static 'cv/bg-1.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .error-page-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        .error-page-wrapper>.container {
            position: relative;
            z-index: 1;
        }

        .twm-u-maintenance-wrap {
            width: 100%;
            padding: 30px 0;
        }

        .twm-u-maintenance-content {
            padding: 20px;
            margin-bottom: 40px;
        }

        .twm-u-maintenance-content .media {
            margin-bottom: 30px;
        }

        .twm-u-maintenance-content .media img {
            max-width: 200px;
            height: auto;
        }

        .twm-u-maintenance-title {
            font-size: 40px;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: bold;
            color: #fff;
        }

        .twm-u-maintenance-title span {
            color: #4597CB;
        }

        .twm-u-maintenance-title2 {
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        .twm-u-maintenance-image {
            text-align: center;
        }

        .twm-u-maintenance-image img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .social-icons {
            display: flex;
            flex-wrap: wrap;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .social-icons li {
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background-color: #4597CB;
            transform: translateY(-3px);
        }

        .btn-primary-blue {
            background-color: #4597CB;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 15px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .btn-primary-blue:hover {
            background-color: #367ba8;
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(50, 50, 93, 0.15);
            color: #fff;
        }

        .btn-light-outline {
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 15px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .btn-light-outline:hover {
            background-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        @media (max-width: 991px) {
            .twm-u-maintenance-content {
                text-align: center;
                margin-bottom: 30px;
            }

            .twm-u-maintenance-content .media {
                justify-content: center;
            }

            .social-icons {
                justify-content: center;
            }

            .action-buttons {
                justify-content: center !important;
            }
        }

        @media (max-width: 767px) {
            .twm-u-maintenance-title {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            .twm-u-maintenance-title {
                font-size: 28px;
            }

            .twm-u-maintenance-content .media img {
                max-width: 150px;
            }
        }
    </style>
</head>

<body>

    <div class="error-page-wrapper">
        <div class="container">
            <div class="twm-u-maintenance-wrap">
                <div class="row align-items-center">

                    <!-- Left Column: Message -->
                    <div class="col-lg-5 col-md-12">
                        <div class="twm-u-maintenance-content">

                            <!-- Logo -->
                            <div class="media mb-4">
                                <a href="/">
                                    <img src="{% static 'cv/UCA-Logo-Centre-whiteframe.png' %}" alt="UCA Logo">
                                </a>
                            </div>

                            <!-- Title -->
                            <h2 class="twm-u-maintenance-title">
                                Access <span>Denied</span>
                            </h2>

                            <!-- Message -->
                            <p class="twm-u-maintenance-title2">
                                {{ message|default:"Your session has expired or you don't have permission to access this
                                page. Please log in again to continue." }}
                            </p>

                            <!-- Action Buttons -->
                            <div class="action-buttons mb-4 d-flex flex-wrap gap-2">
                                <a href="{{ back_url|default:'/' }}" class="btn-primary-blue">
                                    <i class="fas fa-arrow-left"></i>
                                    {{ back_text|default:"Back to Home" }}
                                </a>
                                <a href="{{ login_url|default:'/#login' }}" class="btn-light-outline">
                                    <i class="fas fa-sign-in-alt"></i>
                                    Log In Again
                                </a>
                            </div>

                            <!-- Social links -->
                            <ul class="social-icons">
                                <li>
                                    <a href="https://www.linkedin.com/in/uca-career-opportunities/" title="LinkedIn">
                                        <i class="fab fa-linkedin-in"></i>
                                    </a>
                                </li>
                                <li>
                                    <a href="https://www.instagram.com/uca_career_opportunities/" title="Instagram">
                                        <i class="fab fa-instagram"></i>
                                    </a>
                                </li>
                                <li>
                                    <a href="https://www.youtube.com/@ucacareeropportunities1011" title="YouTube">
                                        <i class="fab fa-youtube"></i>
                                    </a>
                                </li>
                            </ul>

                        </div>
                    </div>

                    <!-- Right Column: Illustration -->
                    <div class="col-lg-7 col-md-12">
                        <div class="twm-u-maintenance-image">
                            <img src="{% static 'cv/access-denied.webp' %}" alt="Access Denied">
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
