<!DOCTYPE html>
<html lang="en">

<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password Confirmation</title>

  <style>
    :root {
      --card-bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --field: #f3f4f6;
      --primary: #1d4ed8;
      --primary-dark: #153eaa;
      --danger: #ef4444;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
      color: var(--text);
      background: #e5ecff;
      line-height: 1.45;
    }

    /* background image (blurred) */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom right, rgba(255, 255, 255, .25), rgba(255, 255, 255, .25)),
      url("{% static 'cv/uca.jpg' %}") center/cover no-repeat;
      filter: blur(8px);
      transform: scale(1.05);
      z-index: 0;
    }

    /* center content */
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* card */
    .card {
      width: min(760px, 94vw);
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .18);
      overflow: hidden;
    }

    .card-head {
      padding: 28px 24px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid #f3f4f6;
    }

    .brand {
      display: flex;
      justify-content: center;
      align-items: center
    }

    .brand img {
      height: 80px;
      width: auto;
      max-width: 180px;
      object-fit: contain
    }

    .brand-text {
      font-size: 12px;
      letter-spacing: .06em;
      color: #4b5563;
      text-transform: uppercase
    }

    .title {
      margin: 6px 0 0;
      font-weight: 800;
      font-size: 30px;
      color: #1e40af;
    }

    .card-body {
      padding: 26px clamp(22px, 4vw, 48px) 34px
    }

    /* alerts */
    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 14px;
      border: 1px solid transparent;
      display: none
    }

    #errorMsg {
      display: none;
      background: #fff1f2;
      border-color: #ffe4e6;
      color: #991b1b
    }

    #successMsg {
      display: none;
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #166534
    }

    /* label + field */
    .form-group {
      margin: 18px 0
    }

    .label {
      font-size: 15px;
      font-weight: 700;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .label .ico {
      width: 18px;
      height: 18px;
      color: #2563eb
    }

    .field {
      position: relative;
      margin-top: 10px;
      background: var(--field);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      transition: .2s border-color, .2s box-shadow, .2s background;
    }

    .field:focus-within {
      border-color: #c7d2fe;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, .15)
    }

    .field input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 16px;
      padding: 14px 8px;
    }

    .field .trail {
      position: absolute;
      right: 12px;
      width: 20px;
      height: 20px;
      color: #9ca3af;
      pointer-events: none;
      /* decorative only */
    }

    .actions {
      margin-top: 22px
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 22px rgba(29, 78, 216, .3);
      cursor: pointer;
      transition: background .15s ease, transform .03s ease;
      letter-spacing: .02em;
    }

    .btn:hover {
      background: var(--primary-dark)
    }

    .btn:active {
      transform: translateY(1px)
    }

    .sub {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }

    .sub a {
      color: #374151;
      text-decoration: none
    }

    .sub a:hover {
      text-decoration: underline
    }

    /* style for hidden login button (kept for your JS) */
    #loginButton {
      display: none;
      margin: 14px auto 0;
      padding: 10px 16px;
      background: #10b981;
      color: #fff;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
    }

    @media (max-width:520px) {
      .title {
        font-size: 26px
      }

      .card-body {
        padding: 22px 18px 28px
      }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrap">
    <div class="card">
      <div class="card-head">
        <div class="brand">
          <a href="/">
            <img src="{% static 'cv/UCA-Logo-Centre-whiteframe.png' %}" alt="UCA Logo" />
          </a>
        </div>
        <div class="brand-text">UNIVERSITY OF CENTRAL ASIA</div>
        <h1 class="title">Reset Your Password</h1>
      </div>

      <div class="card-body">
        <!-- alerts (IDs unchanged for your JS) -->
        <div id="errorMsg" class="alert"></div>
        <div id="successMsg" class="alert"></div>

        <form id="resetForm" method="POST" action="/api/auth/password/reset/confirm-page/{{ uidb64 }}/{{ token }}/">
          {% csrf_token %}

          <div class="form-group">
            <label for="new_password" class="label">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M7 10V7a5 5 0 0 1 10 0v3" />
                <rect x="5" y="10" width="14" height="10" rx="2" />
              </svg>
              New Password*
            </label>
            <div class="field">
              <input type="password" id="new_password" name="new_password" required minlength="8"
                placeholder="Enter your new password">
              <!-- decorative eye icon -->
              <svg class="trail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>

          <!-- Optional visible confirm field (does NOT change your JS/logic) -->
          <div class="form-group">
            <label for="confirm_password" class="label">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z" />
              </svg>
              Confirm Password*
            </label>
            <div class="field">
              <input type="password" id="confirm_password" name="confirm_password"
                placeholder="Confirm your new password">
              <svg class="trail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn">RESET PASSWORD</button>
          </div>

          <p class="sub">
            <span style="display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;">
              <span style="display:inline-flex;align-items:center;gap:4px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M15 18l-6-6 6-6" />
                </svg>
                <a href="/">Log in</a>
              </span>
              <span style="color:var(--border);">|</span>
              <a href="/#signup">Sign up</a>
            </span>
          </p>
        </form>

        <!-- kept for your JS (shown after success) -->
        <button id="loginButton" onclick="window.location.href='/#login';">Go to Login</button>
      </div>
    </div>
  </div>

  <script>
    /* your original JS untouched */
    document.getElementById('resetForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const form = this;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const loginButton = document.getElementById('loginButton');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      loginButton.style.display = 'none';

      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
      })
        .then(response => response.json())
        .then(data => {
          if (data.error || data.non_field_errors) {
            errorMsg.textContent = data.error || data.non_field_errors[0];
            errorMsg.style.display = 'block';
          } else if (data.message) {
            successMsg.textContent = data.message;
            successMsg.style.display = 'block';
            loginButton.style.display = 'inline-block';
            if (data.redirect) {
              setTimeout(() => window.location.href = data.redirect, 3000);
            }
          }
        })
        .catch(error => {
          errorMsg.textContent = 'Failed to connect to the server';
          errorMsg.style.display = 'block';
          console.error('Error:', error);
        });
    });

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
  </script>
</body>

</html>
