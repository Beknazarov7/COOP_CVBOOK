<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password Confirmation</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; display: none; }
        #loginButton { display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Reset Your Password</h2>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    <form id="resetForm" method="POST" action="/api/auth/password/reset/confirm-page/{{ uidb64 }}/{{ token }}/">
        {% csrf_token %}
        <div class="form-group">
            <label for="new_password">New Password:</label>
            <input type="password" id="new_password" name="new_password" required minlength="8">
        </div>
        <button type="submit">Reset Password</button>
    </form>
    <button id="loginButton" onclick="window.location.href='/#login';">Go to Login</button>
    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const loginButton = document.getElementById('loginButton');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            loginButton.style.display = 'none';

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.error || data.non_field_errors) {
                    errorMsg.textContent = data.error || data.non_field_errors[0];
                    errorMsg.style.display = 'block';
                } else if (data.message) {
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'block';
                    loginButton.style.display = 'inline-block'; // Show the login button on success
                    if (data.redirect) {
                        setTimeout(() => window.location.href = data.redirect, 3000); // Redirect after 3 seconds
                    }
                }
            })
            .catch(error => {
                errorMsg.textContent = 'Failed to connect to the server';
                errorMsg.style.display = 'block';
                console.error('Error:', error);
            });
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
