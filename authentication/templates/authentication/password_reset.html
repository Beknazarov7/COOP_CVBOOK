<!DOCTYPE html>
<html lang="en">
<head>
      {% load static %}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset</title>

  <style>
    :root{
      --card-bg:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#1d4ed8;        /* button */
      --primary-dark:#153eaa;   /* button hover */
      --field:#f3f4f6;          /* input bg */
    }

    *{box-sizing:border-box}

    html,body{
      height:100%;
      margin:0;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:#e5ecff;
    }

    /* --- Background (blurred campus image) --- */
    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(to bottom right, rgba(255,255,255,.25), rgba(255,255,255,.25)),
        url("{% static 'cv/uca.jpg' %}") center/cover no-repeat;
      filter: blur(8px);
      transform: scale(1.05);
      z-index: 0;            /* was -1 */
    }

    /* --- Center container --- */
     .wrapper{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:24px;
      position: relative;    /* added */
      z-index: 1;            /* sits above .bg */
    }

    /* --- Card --- */
    .card{
      width:min(680px, 92vw);
      background:var(--card-bg);
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.12);
      overflow:hidden;
    }

    .card-head{
      padding:28px 20px 10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .brand{
      width:56px; height:56px;
      display:grid; place-items:center;
      border-radius:12px;
      background:#eaf1ff;
    }
    /* Simple UCA-like diamond mark (placeholder) */
    .brand svg{display:block}

    .subbrand{
      font-size:12px;
      letter-spacing:.06em;
      color:#4b5563;
      text-transform:uppercase;
    }

    .title{
      margin:6px 0 0;
      font-weight:800;
      font-size:32px;
      letter-spacing:.2px;
    }

    .card-body{
      padding:24px clamp(22px,4vw,40px) 36px;
    }

    /* Messages */
    .alert{
      padding:12px 14px;
      border-radius:10px;
      font-size:14px;
      margin-bottom:16px;
    }
    .alert.error{background:#fff1f2;color:#b91c1c;border:1px solid #fecdd3}
    .alert.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

    /* Form */
    .label{
      font-size:14px;
      font-weight:600;
      color:#374151;
      margin-bottom:8px;
      display:block;
    }

    .field{
      position:relative;
      display:flex;
      align-items:center;
      background:var(--field);
      border:1px solid var(--border);
      border-radius:12px;
      padding:0 14px;
      transition:border-color .2s, box-shadow .2s, background .2s;
    }
    .field:focus-within{
      border-color:#c7d2fe;
      background:#fff;
      box-shadow:0 0 0 4px rgba(59,130,246,.15);
    }
    .field .icon{
      width:18px; height:18px; margin-right:10px; flex:0 0 auto; color:#6b7280;
    }
    .field input{
      appearance:none;
      border:0; outline:0;
      background:transparent;
      width:100%;
      font-size:16px;
      padding:14px 2px;
      color:#111827;
    }

    .actions{
      margin-top:22px;
    }
    .btn{
      width:100%;
      display:inline-flex; justify-content:center; align-items:center;
      padding:14px 20px;
      font-weight:700; font-size:16px;
      background:var(--primary);
      color:#fff; border:0; border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(29,78,216,.35);
      transition:transform .03s ease, background .15s ease;
      text-transform:none;
    }
    .btn:active{transform:translateY(1px)}
    .btn:hover{background:var(--primary-dark)}

    .foot{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }
    .foot a{
      color:var(--primary); text-decoration:none; font-weight:600;
    }
    .foot a:hover{text-decoration:underline}

    /* divider */
    .divider{
      height:1px; background:var(--border); margin-top:24px;
    }

    @media (max-width: 520px){
      .title{font-size:26px}
      .card-body{padding:20px 18px 28px}
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="wrapper">
    <div class="card">
      <div class="card-head">
        <div class="brand" aria-hidden="true">
          <!-- simple diamond logo placeholder -->
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#1d4ed8" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2l9 10-9 10L3 12 12 2z" opacity=".15"/>
            <path d="M12 2l9 10-9 4-9-4 9-10z" opacity=".3"/>
          </svg>
        </div>
        <div class="subbrand">UNIVERSITY OF CENTRAL ASIA</div>
        <h1 class="title">Reset Password</h1>
      </div>

      <div class="card-body">
        {% if error %}
          <div class="alert error">{{ error }}</div>
        {% endif %}
        {% if success %}
          <div class="alert success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/api/auth/password/reset/request/">
          {% csrf_token %}
          <label for="email" class="label">Email</label>

          <div class="field">
            <svg class="icon" viewBox="0 0 24 24" fill="none">
              <path d="M4 6h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.6" />
              <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="email" id="email" name="email" required placeholder="Enter your email" />
          </div>

          <div class="actions">
            <button class="btn" type="submit">Send Reset Link</button>
          </div>

          <div class="divider"></div>

          <p class="foot">
            Remember your password?
            <a href="/templates/cv/authentication.html">Log in</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
