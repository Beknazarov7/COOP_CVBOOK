<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Success</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; text-align: center; }
        .success { color: green; margin-bottom: 20px; }
        a { padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 5px; }
        a:hover { background-color: #45a049; }
    </style>
    <meta http-equiv="refresh" content="3;url=/api/auth/signin/"> <!-- Redirect to login after 3 seconds -->
</head>
<body>
    <div class="success">{{ message }}</div>
    <p>Redirecting to login page in 3 seconds...</p>
    <p>Or click <a href="/api/auth/signin/">here</a> to go now.</p>
</body>
</html>
